<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center;color:white }
    .attribution a { color: hsl(228, 45%, 44%); }
    body{
      background-color: hsl(0, 0%, 8%);
      font-family: 'Inter', sans-serif;
      display:flex;
      flex-direction: column;
      justify-content: center;
      min-height:100vh;
      align-items: center;
      margin:0
    }
    .container{
      color:  hsl(0, 0%, 100%);
      background-color:  hsl(0, 0%, 12%);
      text-align:center;
      display:flex;
      flex-direction: column;
      align-items: center;
      width:300px;
      margin:auto;
      padding:40px;
      border-radius:10px
    }
    img{
      border-radius:50%;
      width:100px;
      height:100px;
      margin-bottom:20px;
    }
    .place{
      color: hsl(75, 94%, 57%);
      font-size:12px;
      margin-bottom:25px
    }
    .list a{
      background-color:  hsl(0, 0%, 20%);
      color:white;
      text-decoration: none;
      border-radius:5px;
      padding:14px;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    .list{
      width:100%;
      display:flex;
      flex-direction: column;
      gap:12px;
    }
    h1{
      font-size:24px;
      margin:0;
      font-weight: 700
    }.about{
      font-size:14px;
      margin:24px 0;

    }.list a:hover{
      background-color: hsl(75, 94%, 57%);
       color: hsl(0, 0%, 8%);
      transition:0.3s;
      transform:scale(1.05)
    }

  </style>
</head>
<body>
  <div class="container">
  <img src="./assets/images/avatar-jessica.jpeg" alt="Jessica Randall's profile picture">
  <h1>Jessica Randall</h1>
  <p class="place">London, United Kingdom</p>
  <p class="about">"Front-end developer and avid reader."</p>
    <div class="list">
  <a href="https://github.com/syedsaniya0001-max">GitHub</a>
  <a href="https://www.frontendmentor.io/profile/syedsaniya0001-max">Frontend Mentor</a>
 <a href="https://www.linkedin.com/in/saniya-s-5109a1378">LinkedIn</a>
 <a href="#">Twitter</a>
 <a href="#">Instagram</a>
 </div>
</div>
  
  <footer class="attribution">

    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">S SANIYA</a>.
  </footer>
</body>
</html>
